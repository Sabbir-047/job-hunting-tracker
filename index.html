<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind and daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <title>Job Hunting Tracker</title>
    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Custom CSS -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-base-200">
    <header class="">
        <section class="w-4/5 mx-auto py-14 space-y-6 border-b-2 border-gray-300">
            <!-- title -->
            <div>
                <h1 class="text-black text-4xl font-bold">Job Hunting Tracker</h1>
            </div>
            <!-- count section -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-5 rounded-2xl space-y-4">
                    <h4 class="text-sm font-medium">Total</h4>
                    <p class="text-2xl">8</p>
                </div>
                <div class="bg-white p-5 rounded-2xl space-y-4">
                    <h4 class="text-sm font-medium">Interview</h4>
                    <p class="text-green-500 text-2xl">0</p>
                </div>
                <div class="bg-white p-5 rounded-2xl space-y-4">
                    <h4 class="text-sm font-medium">Rejected</h4>
                    <p class="text-red-600 text-2xl">0</p>
                </div>
            </div>
        </section>
    </header>




    <!-- main section -->
    <main>
        
    </main>




    <!-- script file -->
    <script src="script.js"></script>
</body>

</html>
